    <img class="grpelem" id="u777-10" alt="Born in Venice in 1988, she gradued in Architecture in 2013 in Venice, under the guide of Giuseppe Longhi and Roberta Albiero, with who collaborates in different courses in architectural composition at IUAV, University of Architecture in Venice. In january 2014 she earn the qualify examination for the licensed profession in Italy and Europe.
She was curator of different pubblications and books, as “I nuovi fondaci per dialogare con l’oriente” and “Il fondaco, archetipo e prototipo per un’architettura mediterranea sostenibile”.
In may 2014 she follows a Master in &quot;Intelligent school design&quot; about how knoledges are shared in the school environment and how urban regeneration could start from schools as point of knoledge.
